context:
  version: "0.1.6"

package:
  name: obscura
  version: ${{ version }}

source:
  url: https://github.com/h4ckf0r0day/obscura/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4d62e6d8d1be4b0a0a4b9142bbb95390a8c531b1425a6352400a0c2c7b9eb7db

build:
  number: 0
  skip: win
  script:
    content:
      - export LIBCLANG_PATH=${BUILD_PREFIX}/lib
      - export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=${CONDA_BUILD_SYSROOT} -isystem $(${CC} -print-file-name=include)"
      - if: osx
        then:
          - export CFLAGS="${CFLAGS} -mlinker-version=100"
          - export CXXFLAGS="${CXXFLAGS} -mlinker-version=100"
      - cargo auditable install --locked --path crates/obscura-cli --features stealth --root ${{ PREFIX }} --no-track
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-auditable
    - cargo-bundle-licenses
    - cmake
    - libclang
    - make
    - perl

tests:
  - script:
      - obscura --help
  - package_contents:
      bin:
        - obscura
        - obscura-worker
      strict: true

about:
  homepage: https://github.com/h4ckf0r0day/obscura
  summary: The headless browser for AI agents and web scraping
  description: |
    Obscura is a headless browser engine written in Rust for web scraping
    and AI agent automation. It runs JavaScript via V8, supports the Chrome
    DevTools Protocol, and provides a command line interface for serving and
    fetching pages.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/h4ckf0r0day/obscura

extra:
  recipe-maintainers:
    - moritzwilksch
